<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Gallery — Sarvothomukha International Public School</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="./css/styles.css"/>
<style>
  .filter-bar { display:flex;justify-content:center;gap:12px;flex-wrap:wrap;padding:40px 6vw 0; }
  .filter-btn { padding:9px 22px;border-radius:50px;font-size:13px;font-weight:600;border:1px solid var(--border);background:white;color:var(--mid);cursor:pointer;transition:all 0.2s; }
  .filter-btn:hover, .filter-btn.active { background:linear-gradient(135deg,var(--sky-deep),var(--sky));color:white;border-color:transparent; }
  .masonry-grid { columns:4 240px; column-gap:16px; padding: 48px 6vw 100px;}
  .masonry-item { break-inside:avoid;margin-bottom:16px;border-radius:16px;overflow:hidden;position:relative;cursor:pointer;background:var(--sky-pale);transition:transform 0.3s; }
  .masonry-item:hover { transform:translateY(-4px); }
  .masonry-item img { width:100%;display:block;transition:transform 0.4s;min-height:120px;object-fit:cover; }
  .masonry-item:hover img { transform:scale(1.05); }
  .masonry-tag { position:absolute; bottom:14px; left:14px; background:rgba(107,200,255,0.9); color:white; border-radius:20px; padding:4px 12px; font-size:12px; font-weight:600; }
  /* Lightbox */
  .lightbox { display:none;position:fixed;inset:0;z-index:999;background:rgba(13,34,51,0.95);backdrop-filter:blur(8px);align-items:center;justify-content:center;padding:20px; }
  .lightbox.open { display:flex; }
  .lightbox img { max-width:90vw;max-height:85vh;border-radius:16px;object-fit:contain; }
  .lb-close { position:absolute;top:20px;right:30px;background:rgba(255,255,255,0.2);color:white;border:none;border-radius:50%;width:40px;height:40px;font-size:20px;cursor:pointer; }
  @media (max-width: 640px) { .masonry-grid { columns:2 140px; } }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-brand">
    <div class="nav-logo-circle"><img src="./images/sarvothomukhalogo.png" alt="logo"></div>
    <div class="nav-name">Sarvothomukha<br><span>International Public School</span></div>
  </a>
  <button class="menu-toggle" id="menuToggle">☰</button>
  <ul class="nav-links" id="navLinks">
    <li><a href="index.html">Home</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="gallery.html" class="active">Gallery</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>
</nav>

<div class="page-hero">
  <div class="breadcrumb"><a href="index.html">Home</a><span>›</span><span>Gallery</span></div>
  <h1>Our <em>Gallery</em></h1>
  <p>Beautiful memories of our children and teachers — every moment a story, every photo a treasure.</p>
</div>

<div class="filter-bar" id="filterBar"></div>
<div class="masonry-grid reveal" id="masonryGrid"></div>

<div class="lightbox" id="lightbox">
  <button class="lb-close" id="lbClose">✕</button>
  <img id="lbImg" src="" alt="Gallery Fullscreen"/>
</div>

<footer>
  <p>© 2025 <strong>Sarvothomukha International Public School</strong>. All rights reserved.</p>
</footer>

<script type="module">
  import { SIPS } from './js/sips-data.js';

  async function initGallery() {
    const galleryData = await SIPS.get('gallery');
    
    // Dynamic Filter Buttons
    const cats = ['all', ...new Set(galleryData.map(g => g.cat))];
    document.getElementById('filterBar').innerHTML = cats.map(c => 
      `<button class="filter-btn ${c==='all'?'active':''}" onclick="filterGal('${c}', this)">${c.charAt(0).toUpperCase()+c.slice(1)}</button>`
    ).join('');

    // Render Grid
    window.allPhotos = galleryData;
    renderGrid(galleryData);

    const obs = new IntersectionObserver(e => e.forEach(x => { if(x.isIntersecting) x.target.classList.add('visible'); }));
    document.querySelectorAll('.reveal').forEach(r => obs.observe(r));
  }

  function renderGrid(data) {
    document.getElementById('masonryGrid').innerHTML = data.map((g, i) => `
      <div class="masonry-item" onclick="openLb('${g.src}')">
        <img src="${g.src}" alt="School Photo" loading="lazy" onerror="this.parentElement.style.display='none'"/>
        <span class="masonry-tag">${g.cat}</span>
      </div>`).join('');
  }

  window.filterGal = function(cat, btn) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderGrid(cat === 'all' ? window.allPhotos : window.allPhotos.filter(g => g.cat === cat));
  };

  const lb = document.getElementById('lightbox');
  window.openLb = (src) => { document.getElementById('lbImg').src = src; lb.classList.add('open'); };
  document.getElementById('lbClose').addEventListener('click', () => lb.classList.remove('open'));
  lb.addEventListener('click', (e) => { if(e.target === lb) lb.classList.remove('open'); });

  document.getElementById('menuToggle').addEventListener('click', () => { document.getElementById('navLinks').classList.toggle('show'); });

  initGallery();
</script>
</body>
</html>
